              - heading "April 03, 2026" [level=2] [ref=e49]
              - generic [ref=e51]:
                - generic [ref=e52]:
                  - heading "FINALLY, Some Warm Weather" [level=3] [ref=e53]
                  - generic [ref=e54]:
                    - paragraph [ref=e55]: After a cool, wet March, we are finally getting some warm spring days.
                    - paragraph [ref=e56]: Warm and dry enough so that you will be comfortable without a jacket. Highs reaching the upper 60s and some sun.
                    - paragraph [ref=e57]: Perfect weather for that bike ride, hike, gardening, or simply a pleasant talk.
                    - paragraph [ref=e58]: The National Weather Service National Blend of Models (their most skillful product) is going for 62F on Saturday, 65F on Sunday, and nearly 70F on Sunday in Seattle, before cooling down on Tuesday.
                    - link [ref=e60] [cursor=pointer]:
                      - /url: https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj7bbjFKvPmx2bLOEb8a62J90Qx01f6pccXOwr6rKM8bgPOf1Y_xDvJTB3JdKmbQQnES1Ykm0Pgti7J0UUzTrp6aG8iQ7pkZ-mX2v7fPIO0OkV41PKGFQvZVM5X8GV_qM09QIgWf1xrHgkUDhqmOxa7-pTpj0cYrAngoWGCztqUgBW-Ysz75kLnMQ1V2zY/s1458/Screenshot%202026-04-03%20at%208.39.06%E2%80%AFPM.png
                      - img [ref=e62]
                    - generic [ref=e63]: Eastern Washington will be considerably warmer, reaching nearly 80F in the Tri-Cities on Monday.
                    - link [ref=e65] [cursor=pointer]:
                      - /url: https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiy9mARsKNhgnI5BfeAFoj3naK56ZELHerRW49uWnbTIxCe2q-GP-y2tO5-D4s9hmi_zZ1XOV_4_SK5YrNrza3X9y20MtnC-qvkTz6OBAb52-lRnOnaNZJWz88O7cTmgLtYUlS_LSjwm01n0VriS1r8x5kTxSAfVru1AULZlzhQrlbdf3ewtKPBfu1kVxg/s1458/Screenshot%202026-04-03%20at%208.40.10%E2%80%AFPM.png
                      - img [ref=e67]
                    - generic [ref=e69]: To provide more detail, here are forecast temperatures for 5 PM Sunday afternoon from the UW high-resolution model.
                    - generic [ref=e71]: Upper 60s and 70s from southern Puget Sound to Portland, and also warm in the lower Columbia Valley
                    - link [ref=e74] [cursor=pointer]:
                      - /url: https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgJrYnP7hzb5RDARfw1zmcU_gG6Sdv13uoq7OHlUPZIxFKeJZSr5brCn20kexJ56qoZJtWYY5Wk5qhKbAsuDbMPIi9_LP8qZPvbR_H9hYA86cHelOtHpfnXA1i4FC4sysZN6imt1t4JjP83M0BG2sWQZkaTjzWP3RH55Uhjml77UflPlr8jiYXVs7up8YA/s1460/Screenshot%202026-04-03%20at%208.43.11%E2%80%AFPM.png
                      - img [ref=e76]
                    - text: By Monday afternoon at the same time, western Washington and Oregon have cooled a bit, while the Columbia Valley has warmed.
                    - generic [ref=e78]:
                      - link [ref=e80] [cursor=pointer]:
                        - /url: https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiYT0wL1eh0D1_gpVPAMIverHRhbeN2BbEElBe2OBSZd2C_du5BEokxvEaWsXQ4IdGqwoNgXWJu8vYdMNYpqOy0Ytf2wuBlRmF9nwGqOlnRicvIdLnPVhyphenhyphenQfO_oicaeN3aVdDPj_a5V4dlO_fneMY4BOWphzp539Mk3HtjSFDKbWTWpWf_gDBErOwAjoG0/s1460/Screenshot%202026-04-03%20at%208.43.47%E2%80%AFPM.png
                        - img [ref=e82]
                      - generic [ref=e83]: All this warming is associated with a transient upper-level ridge of high pressure that will build over the area this week (see below, for 500 hPa...about 18,000 ft, red indicates high pressure).
                      - generic [ref=e84]:
                        - link [ref=e86] [cursor=pointer]:
