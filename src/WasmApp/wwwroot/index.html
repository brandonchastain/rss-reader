<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RssReader</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WasmApp.styles.css" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <script>
        // Warm up the API function to reduce cold start latency
        fetch('/api/healthz').catch(() => {});

        // Auto-redirect returning users to login when SWA session expired.
        // Runs before Blazor loads to avoid a flash of the unauthenticated page.
        // Uses sessionStorage guard so we only try once per tab (prevents login loops
        // if the user cancels AAD login or AAD session has also expired).
        (function() {
            if (localStorage.getItem('rssApp.returningUser') === 'true' &&
                !sessionStorage.getItem('rssApp.loginAttempted')) {
                fetch('/.auth/me').then(function(r) { return r.json(); }).then(function(data) {
                    if (!data.clientPrincipal) {
                        sessionStorage.setItem('rssApp.loginAttempted', '1');
                        var returnUrl = window.location.pathname || '/timeline';
                        if (returnUrl === '/' || returnUrl === '/index') returnUrl = '/timeline';
                        window.location.replace('/.auth/login/aad?post_login_redirect_uri=' + encodeURIComponent(returnUrl));
                    }
                }).catch(function() {});
            }
        })();
    </script>
    <div id="app"></div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="app.js"></script>
</body>

</html>
